steps:
  - id: install
    name: node:20
    entrypoint: bash
    args:
      - -lc
      - |
        cd packages/shared-types && npm install --no-audit --no-fund && npm run build
        cd ../../apps/web && npm ci --no-audit --no-fund

  - id: build
    name: node:20
    entrypoint: bash
    args:
      - -lc
      - |
        cd apps/web && npm run build -- --configuration=production

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -lc
      - |
        curl -sL https://firebase.tools | bash
        firebase deploy --only hosting,firestore:rules,firestore:indexes --project ${PROJECT_ID} --non-interactive

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
